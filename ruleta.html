<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Ruleta - VirtualGift</title>
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/games.css">

  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/sounds.js"></script>
  <script defer src="js/unity-ads.js"></script>
  <script defer src="js/unity-banner.js"></script>
<script defer src="js/ruleta.js"></script>
</head>
<body>


  <!-- TOP BAR -->
  <div class="game-topbar">
    <button type="button" class="game-back" onclick="window.location.href=typeof withAppFlag==='function'?withAppFlag('inicio.html'):'inicio.html'">&lt;</button>
    <span class="game-top-title">Ruleta de Coins</span>
    <div class="balance-chip">
      <span class="balance-chip-icon">VC</span>
      <span class="balance-chip-val" id="balanceVal">0</span>
    </div>
  </div>

  <div class="game-wrap">

    <!-- HERO -->
    <div class="roulette-hero">
      <div class="roulette-hero-glow" aria-hidden="true"></div>
      <div class="roulette-hero-badge">TOP PREMIO: 100 VC</div>
      <p class="roulette-hero-title">Ruleta de Coins</p>
      <p class="roulette-hero-sub">3 giros gratis al dia &nbsp;-&nbsp; hasta 100 VC por giro</p>
    </div>

    <!-- PLAYS -->
    <div class="plays-row">
      <span class="plays-label" id="playsLabel">Cargando...</span>
      <div class="plays-pips" id="playsPips"></div>
    </div>

    <!-- WHEEL -->
    <div class="wheel-container">
      <svg class="wheel-pointer" viewBox="0 0 22 32" width="22" height="32" aria-hidden="true">
        <polygon points="11,30 1,3 21,3" fill="#ffc837"/>
        <polygon points="11,30 1,3 21,3" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
        <circle cx="11" cy="4.5" r="4" fill="#ffc837" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
        <circle cx="10" cy="3.5" r="1.8" fill="rgba(255,255,255,0.65)"/>
      </svg>
      <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>

    <!-- RESULT -->
    <div class="result-display" id="resultDisplay">
      <span class="result-hint">Pulsa GIRAR para jugar</span>
    </div>

    <button type="button" class="spin-btn" id="spinBtn" onclick="doSpin()">
      GIRAR
    </button>
    <div class="ad-extra-row" id="adPlayRow" style="display:none;">
      <button type="button" class="ad-extra-btn" id="adPlayBtn">
        Ver anuncio y ganar +1 giro
      </button>
    </div>
<!-- LEYENDA -->
    <div class="roulette-legend" id="rouletteLegend"></div>
</div>
<div class="game-toast" id="gameToast"></div>


</body>
</html>
