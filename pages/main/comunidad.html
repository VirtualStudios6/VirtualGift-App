<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Comunidad - VirtualGift</title>
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/splash.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/bottom-nav.css">

  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/notification-badge.js"></script>
  <script defer src="js/sounds.js"></script>
  <script defer src="js/unity-ads.js"></script>
  <script defer src="js/unity-banner.js"></script>
  <script defer src="js/comunidad.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #03010f; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #03010f;
      color: #dcefff;
      min-height: 100dvh;
      overflow-x: hidden;
      padding-top: calc(62px + env(safe-area-inset-top));
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    .page-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 16px 16px;
    }

    /* -- HERO -- */
    .community-hero {
      text-align: center;
      padding: 24px 0 20px;
      position: relative;
    }
    .community-hero::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 300px; height: 100px;
      background: radial-gradient(ellipse, rgba(139,92,246,.22) 0%, transparent 70%);
      filter: blur(24px); pointer-events: none;
    }
    .hero-emoji { font-size: 2.6rem; line-height: 1; margin-bottom: 10px; display: block; }
    .hero-title {
      font-size: 1.85rem; font-weight: 900; letter-spacing: -.03em;
      background: linear-gradient(135deg, #e879f9 0%, #a78bfa 45%, #60a5fa 90%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .hero-sub { font-size: .8rem; color: rgba(196,181,253,.5); }

    .stats-chips {
      display: flex; gap: 7px; justify-content: center;
      margin-top: 18px; flex-wrap: wrap;
    }
    .stat-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 999px; padding: 6px 13px;
      font-size: .75rem; font-weight: 700; color: rgba(220,239,255,.75);
    }
    .stat-chip-val { color: #a78bfa; font-weight: 900; }

    /* -- SECTION -- */
    .c-section { margin: 22px 0; }
    .c-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 13px;
    }
    .c-section-title {
      font-size: .97rem; font-weight: 900; color: #fff;
      display: flex; align-items: center; gap: 7px;
    }
    .c-badge-live {
      font-size: .6rem; font-weight: 800; letter-spacing: .1em;
      color: #4ade80; background: rgba(74,222,128,.12);
      border: 1px solid rgba(74,222,128,.28);
      border-radius: 999px; padding: 2px 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .c-badge-live::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: liveDot 1.4s ease-in-out infinite;
    }
    @keyframes liveDot { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    .refresh-btn {
      display: flex; align-items: center; gap: 4px;
      background: none; border: 1px solid rgba(139,92,246,.28);
      border-radius: 999px; padding: 4px 11px;
      color: rgba(196,181,253,.55); font-size: .7rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background .15s, color .15s;
    }
    .refresh-btn:active { background: rgba(139,92,246,.12); color: #a78bfa; }

    /* -- PODIUM -- */
    .podium {
      display: grid; grid-template-columns: 1fr 1.15fr 1fr;
      gap: 8px; margin-bottom: 10px; align-items: flex-end;
    }
    .podium-item {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 12px 6px 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px; text-align: center; position: relative; overflow: hidden;
    }
    .podium-item--1 {
      border-color: rgba(251,191,36,.35);
      background: linear-gradient(170deg, rgba(251,191,36,.09) 0%, rgba(3,1,15,0) 60%);
      padding-top: 16px;
    }
    .podium-item--2 {
      border-color: rgba(203,213,225,.18);
      background: linear-gradient(170deg, rgba(203,213,225,.05) 0%, rgba(3,1,15,0) 60%);
    }
    .podium-item--3 {
      border-color: rgba(205,127,50,.2);
      background: linear-gradient(170deg, rgba(205,127,50,.06) 0%, rgba(3,1,15,0) 60%);
    }
    .podium-medal { font-size: 1.5rem; line-height: 1; }
    .podium-item--1 .podium-medal { font-size: 1.85rem; }
    .podium-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .88rem; font-weight: 900; color: #fff;
      border: 2px solid rgba(255,255,255,.12); flex-shrink: 0;
    }
    .podium-item--1 .podium-avatar {
      width: 54px; height: 54px; font-size: 1rem;
      border-color: rgba(251,191,36,.55);
      box-shadow: 0 0 20px rgba(251,191,36,.28);
    }
    .podium-name {
      font-size: .68rem; font-weight: 700; color: rgba(220,239,255,.85);
      width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 4px;
    }
    .podium-coins {
      font-size: .7rem; font-weight: 900; color: #fbbf24;
      display: flex; align-items: center; gap: 3px;
    }
    .podium-rank-num { font-size: .62rem; font-weight: 900; color: rgba(220,239,255,.28); }

    /* -- RANK LIST -- */
    .rank-list { display: flex; flex-direction: column; gap: 7px; }
    .rank-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px; padding: 10px 12px;
      transition: background .15s;
    }
    .rank-row:active { background: rgba(255,255,255,.05); }
    .rank-num { font-size: .74rem; font-weight: 900; color: rgba(220,239,255,.28); width: 22px; text-align: right; flex-shrink: 0; }
    .rank-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 900; color: #fff; flex-shrink: 0;
    }
    .rank-name { flex: 1; font-size: .82rem; font-weight: 700; color: rgba(220,239,255,.85); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-coins { font-size: .78rem; font-weight: 900; color: #fbbf24; flex-shrink: 0; }
    .rank-you {
      font-size: .56rem; font-weight: 800; letter-spacing: .06em;
      color: #a78bfa; background: rgba(139,92,246,.18);
      border: 1px solid rgba(139,92,246,.32);
      border-radius: 999px; padding: 1px 6px; margin-left: 5px;
      vertical-align: middle; display: inline-block;
    }
    .my-rank-card {
      display: flex; align-items: center; gap: 10px;
      background: rgba(139,92,246,.07);
      border: 1px solid rgba(139,92,246,.28);
      border-radius: 14px; padding: 10px 12px;
      margin-top: 8px;
    }

    /* -- ACTIVITY -- */
    .activity-list { display: flex; flex-direction: column; gap: 8px; }
    .activity-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px; padding: 11px 12px;
    }
    .activity-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .78rem; font-weight: 900; color: #fff; flex-shrink: 0;
    }
    .activity-body { flex: 1; min-width: 0; }
    .activity-text {
      font-size: .8rem; font-weight: 600; color: rgba(220,239,255,.8);
      line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .activity-text strong { color: #fff; font-weight: 800; }
    .activity-time { font-size: .67rem; color: rgba(220,239,255,.32); margin-top: 3px; }
    .activity-icon { font-size: 1.1rem; flex-shrink: 0; }

    /* -- SKELETON -- */
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.085) 50%, rgba(255,255,255,.04) 100%);
      background-size: 200% 100%;
      animation: skelShimmer 1.6s ease-in-out infinite;
      border-radius: 10px;
    }
    @keyframes skelShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* -- EMPTY -- */
    .empty-state {
      text-align: center; padding: 28px 16px;
      color: rgba(220,239,255,.28); font-size: .82rem; font-weight: 600;
    }

    /* -- DIVIDER -- */
    .c-divider {
      height: 1px; background: rgba(255,255,255,.06);
      margin: 22px 0;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="vg-splash">
    <img id="vg-splash-logo" src="images/logo-virtual-login.png" alt="VirtualGift">
    <div id="vg-splash-name">VIRTUAL<span>GIFT</span></div>
    <div id="vg-splash-spinner"></div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="logo" style="cursor:pointer;" onclick="window.location.href=withAppFlag('inicio.html')">
      <img src="images/logo-virtual-login.png" alt="VirtualGift" class="logo-image">
      <span class="logo-text">VIRTUAL<span class="logo-studios">GIFT</span></span>
    </div>
    <div class="header-icons">
      <div class="icon-users" onclick="window.location.href=withAppFlag('home.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="icon-coin" onclick="window.location.href=withAppFlag('puntos.html')" style="cursor:pointer;">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="#FDB813"/>
          <defs><radialGradient id="cg"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#FFA500"/></radialGradient></defs>
          <circle cx="50" cy="50" r="42" fill="url(#cg)"/>
          <path d="M 30 30 L 42 65 L 50 65 L 58 65 L 70 30 L 62 30 L 54 57 L 50 57 L 46 57 L 38 30 Z" fill="#FFFACD"/>
        </svg>
      </div>
      <div class="icon-notification" onclick="window.location.href=withAppFlag('notificaciones.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="notification-badge" id="badgeCount" style="display:none;">0</span>
      </div>
    </div>
  </header>

  <div class="page-wrap">

    <!-- HERO -->
    <div class="community-hero">
      <span class="hero-emoji">&#x1F31F;</span>
      <h1 class="hero-title">Comunidad</h1>
      <p class="hero-sub">Ve qui&eacute;n lidera y qu&eacute; est&aacute; pasando</p>
      <div class="stats-chips">
        <div class="stat-chip">&#x1F465; <span class="stat-chip-val" id="statUsers">--</span> usuarios</div>
        <div class="stat-chip">&#x1F381; <span class="stat-chip-val" id="statSorteos">--</span> sorteos activos</div>
        <div class="stat-chip">&#x1F3B0; <span class="stat-chip-val" id="statGiros">--</span> giros hoy</div>
      </div>
    </div>

    <div class="c-divider"></div>

    <!-- RANKING -->
    <div class="c-section">
      <div class="c-section-head">
        <span class="c-section-title">&#x1F4CA; Ranking de Coins</span>
        <button class="refresh-btn" onclick="loadRanking()">&#x21BB; Actualizar</button>
      </div>

      <div class="podium" id="rankingPodium">
        <div class="skel" style="height:128px;border-radius:18px;"></div>
        <div class="skel" style="height:150px;border-radius:18px;"></div>
        <div class="skel" style="height:112px;border-radius:18px;"></div>
      </div>

      <div class="rank-list" id="rankingList">
        <div class="skel" style="height:54px;border-radius:14px;"></div>
        <div class="skel" style="height:54px;border-radius:14px;"></div>
        <div class="skel" style="height:54px;border-radius:14px;"></div>
        <div class="skel" style="height:54px;border-radius:14px;"></div>
      </div>

      <div id="myRankCard" style="display:none;"></div>
    </div>

    <div class="c-divider"></div>

    <!-- ACTIVIDAD -->
    <div class="c-section">
      <div class="c-section-head">
        <span class="c-section-title">&#x1F3A1; Actividad Reciente</span>
        <span class="c-badge-live">EN VIVO</span>
      </div>
      <div class="activity-list" id="activityList">
        <div class="skel" style="height:62px;border-radius:14px;"></div>
        <div class="skel" style="height:62px;border-radius:14px;"></div>
        <div class="skel" style="height:62px;border-radius:14px;"></div>
        <div class="skel" style="height:62px;border-radius:14px;"></div>
      </div>
    </div>
</div>
<script defer src="js/bottom-nav.js"></script>
  <script src="js/splash.js"></script>
</body>
</html>
