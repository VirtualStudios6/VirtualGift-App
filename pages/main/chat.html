<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Soporte — VirtualGift</title>
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/splash.css">
  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/chat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #06011c;
      color: #e2e8f0;
      padding-top: calc(62px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(62px + env(safe-area-inset-bottom, 0px));
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    /* focus ring for keyboard nav */
    :focus-visible {
      outline: 2px solid rgba(139,92,246,.7);
      outline-offset: 2px;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: calc(62px + env(safe-area-inset-top, 0px));
      padding: env(safe-area-inset-top, 0px) 14px 0;
      background: rgba(6,1,28,.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center; gap: 10px;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .back-btn:hover  { background: rgba(255,255,255,.1); }
    .back-btn:active { background: rgba(255,255,255,.14); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(226,232,240,.8); }
    .hdr-av {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg,#4c1d95,#7c3aed);
      border: 1.5px solid rgba(139,92,246,.5);
      overflow: hidden; flex-shrink: 0; position: relative;
    }
    .hdr-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hdr-av-dot {
      position: absolute; bottom: 0; right: 0;
      width: 11px; height: 11px; border-radius: 50%;
      background: #22c55e; border: 2px solid #06011c;
    }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr-name { font-size: .88rem; font-weight: 800; color: #fff; }
    .hdr-status {
      font-size: .65rem; font-weight: 600; color: #4ade80;
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
      transition: color .3s;
    }
    .hdr-status.st-replied { color: #60a5fa; }
    .hdr-status.st-closed  { color: #f87171; }
    .hdr-status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    .hdr-home-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.25);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .hdr-home-btn:hover { background: rgba(139,92,246,.2); }
    .hdr-home-btn svg { width: 17px; height: 17px; fill: #a78bfa; }

    /* ── HELP VIEW ───────────────────────────────────── */
    #helpView {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      min-height: calc(100vh - 124px - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px));
      padding: 32px 24px 24px;
    }
    .welcome-av {
      width: 90px; height: 90px; border-radius: 26px;
      background: linear-gradient(135deg,#4c1d95,#7c3aed);
      border: 2px solid rgba(139,92,246,.45);
      overflow: hidden; position: relative;
      box-shadow: 0 8px 36px rgba(109,40,217,.4);
      margin-bottom: 22px;
      animation: wAvIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .welcome-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .welcome-av-dot {
      position: absolute; bottom: 5px; right: 5px;
      width: 15px; height: 15px; border-radius: 50%;
      background: #22c55e; border: 2.5px solid #06011c;
    }
    @keyframes wAvIn { from{opacity:0;transform:scale(.7) translateY(12px)} to{opacity:1;transform:none} }
    .welcome-title {
      font-size: 1.45rem; font-weight: 900; color: #fff;
      letter-spacing: -.025em; margin-bottom: 10px;
      animation: wFadeUp .4s .1s ease both;
    }
    .welcome-sub {
      font-size: .88rem; color: rgba(226,232,240,.52);
      line-height: 1.65; margin-bottom: 20px;
      animation: wFadeUp .4s .18s ease both;
    }
    .welcome-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.22);
      border-radius: 30px; padding: 6px 16px;
      font-size: .72rem; font-weight: 700; color: #4ade80;
      animation: wFadeUp .4s .26s ease both;
    }
    .welcome-pill-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
      animation: wPulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes wFadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes wPulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)} }

    /* ── CHAT VIEW ───────────────────────────────────── */
    #chatView {
      display: none;
      position: fixed;
      top: calc(62px + env(safe-area-inset-top, 0px));
      bottom: calc(62px + env(safe-area-inset-bottom, 0px));
      left: 0; right: 0;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: #06011c;
      z-index: 10;
    }
    .chat-content {
      padding: 14px 14px 18px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── TICKET BAR (compact) ────────────────────────── */
    .ticket-bar {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; padding: 7px 11px; flex-shrink: 0;
    }
    .ticket-icon  { font-size: .88rem; flex-shrink: 0; }
    .ticket-num   { font-size: .74rem; font-weight: 700; color: rgba(226,232,240,.65); }
    .ticket-sep   { font-size: .74rem; color: rgba(226,232,240,.2); flex-shrink: 0; }
    .ticket-dot   {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: #22c55e;
      transition: background .3s;
    }
    .ticket-dot[data-s="waiting"] { background: #fbbf24; animation: tdotPulse 2s ease-in-out infinite; }
    .ticket-dot[data-s="replied"] { background: #60a5fa; }
    .ticket-dot[data-s="closed"]  { background: #6b7280; }
    @keyframes tdotPulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .ticket-badge {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px;
      font-size: .63rem; font-weight: 700; white-space: nowrap;
      background: rgba(74,222,128,.1); color: #4ade80; border: 1px solid rgba(74,222,128,.2);
      transition: background .3s, color .3s, border-color .3s;
    }
    .ticket-badge[data-s="waiting"] { background:rgba(251,191,36,.1); color:#fbbf24; border-color:rgba(251,191,36,.2); }
    .ticket-badge[data-s="replied"] { background:rgba(96,165,250,.1);  color:#60a5fa; border-color:rgba(96,165,250,.2); }
    .ticket-badge[data-s="closed"]  { background:rgba(255,255,255,.05); color:rgba(226,232,240,.35); border-color:rgba(255,255,255,.07); }

    /* ── DATE SEPARATOR ──────────────────────────────── */
    .chat-date-sep {
      display: flex; align-items: center; justify-content: center;
      margin: 4px 0;
    }
    .chat-date-sep span {
      font-size: .62rem; font-weight: 600; color: rgba(226,232,240,.28);
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px; padding: 3px 10px;
      letter-spacing: .03em;
    }

    /* ── DIVIDER / WELCOME CARD ──────────────────────── */
    .chat-divider {
      display: flex; align-items: center; gap: 8px;
      font-size: .6rem; font-weight: 700; color: rgba(226,232,240,.25);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .chat-divider::before, .chat-divider::after {
      content:''; flex:1; height:1px; background:rgba(255,255,255,.06);
    }
    .chat-welcome {
      background: rgba(139,92,246,.06); border: 1px solid rgba(139,92,246,.14);
      border-radius: 14px; padding: 12px 14px; text-align: center;
    }
    .chat-welcome-title { font-size: .82rem; font-weight: 800; color: #c4b5fd; margin-bottom: 3px; }
    .chat-welcome-text  { font-size: .73rem; color: rgba(226,232,240,.45); line-height: 1.6; }

    /* ── MESSAGES ────────────────────────────────────── */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);   }
    }
    .msg-animate { animation: msgIn .2s cubic-bezier(.22,1,.36,1) both; }
    .msg-row     { display: flex; align-items: flex-end; gap: 7px; }
    .msg-row--user  { justify-content: flex-end; }
    .msg-row--admin { justify-content: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg,#4c1d95,#7c3aed);
      border: 1.5px solid rgba(139,92,246,.35);
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .msg-bubble {
      max-width: 68%; border-radius: 18px; padding: 9px 13px;
      font-size: .84rem; line-height: 1.55; word-break: break-word;
    }
    .bubble--user  {
      background: linear-gradient(135deg,#6d28d9,#a855f7); color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 14px rgba(139,92,246,.28);
    }
    .bubble--admin {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      color: rgba(226,232,240,.92); border-bottom-left-radius: 4px;
    }
    .bubble--img { padding: 5px; }
    .msg-sender  { font-size: .6rem; font-weight: 700; color: rgba(196,181,253,.6); margin-bottom: 3px; }
    .msg-time    {
      font-size: .58rem; color: rgba(255,255,255,.4);
      margin-top: 4px; text-align: right;
      display: flex; align-items: center; justify-content: flex-end; gap: 3px;
    }
    .bubble--admin .msg-time { text-align: left; justify-content: flex-start; color: rgba(226,232,240,.3); }
    .msg-image { display: block; max-width: 100%; max-height: 240px; border-radius: 12px; cursor: zoom-in; object-fit: cover; }
    .msg-img-caption { font-size: .81rem; margin-top: 5px; padding: 0 2px; }

    /* Delivery ticks */
    .msg-ticks         { font-size: .65rem; color: rgba(255,255,255,.38); line-height: 1; }
    .msg-ticks--read   { color: #60a5fa; }

    /* File card */
    .msg-file-wrap { max-width: 260px; }
    .msg-file-card {
      display: flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 13px; padding: 9px 11px;
      cursor: pointer; min-width: 180px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .msg-file-card:hover  { background: rgba(255,255,255,.11); }
    .msg-file-card:active { background: rgba(255,255,255,.14); }
    .msg-file-icon { width:36px;height:36px;border-radius:9px;background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.25);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0; }
    .msg-file-info { flex:1; min-width:0; }
    .msg-file-name { font-size:.77rem;font-weight:700;color:rgba(226,232,240,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px; }
    .msg-file-meta { font-size:.62rem;color:rgba(226,232,240,.4);margin-top:2px; }
    .msg-file-dl   { font-size:.88rem;color:rgba(226,232,240,.4);flex-shrink:0; }
    .msg-time--file       { font-size:.58rem;color:rgba(255,255,255,.35);text-align:right;margin-top:4px;padding-right:4px;display:flex;align-items:center;justify-content:flex-end;gap:3px; }
    .msg-time--admin { text-align:left;justify-content:flex-start;padding-right:0;padding-left:4px;color:rgba(226,232,240,.28); }

    /* Typing indicator */
    .chat-typing-row { display: none; align-items: flex-end; gap: 7px; }
    .chat-typing-row.visible { display: flex; }
    .chat-typing-bubble {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 11px 14px; display: flex; gap: 4px; align-items: center;
    }
    .typing-dot { width:6px;height:6px;border-radius:50%;background:rgba(226,232,240,.5);animation:tdBounce .9s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay:.16s; }
    .typing-dot:nth-child(3) { animation-delay:.32s; }
    @keyframes tdBounce { 0%,80%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-4px);opacity:1} }

    /* Upload placeholder */
    .msg-uploading {
      display: flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px; border-bottom-right-radius: 4px;
      padding: 9px 13px; font-size: .76rem; color: rgba(226,232,240,.5);
    }
    .spin-ring-sm { width:14px;height:14px;border:2px solid rgba(255,255,255,.12);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Closed banner */
    .chat-closed-banner {
      background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.16);
      border-radius: 13px; padding: 10px 13px;
      font-size: .76rem; color: rgba(252,165,165,.7); text-align: center; display: none;
    }

    /* ── SATISFACTION SURVEY ─────────────────────────── */
    .chat-survey {
      background: rgba(139,92,246,.07); border: 1px solid rgba(139,92,246,.18);
      border-radius: 16px; padding: 16px; text-align: center;
    }
    .chat-survey-title { font-size:.88rem;font-weight:800;color:#e9d5ff;margin-bottom:3px; }
    .chat-survey-sub   { font-size:.71rem;color:rgba(226,232,240,.45);margin-bottom:14px;line-height:1.5; }
    .survey-stars      { display:flex;justify-content:center;gap:7px;margin-bottom:10px; }
    .survey-star {
      width:42px;height:42px;border-radius:12px;font-size:1.3rem;
      background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:background .15s,transform .1s,border-color .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .survey-star.sel         { background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.4);transform:scale(1.12); }
    .survey-star:hover:not(.sel) { background:rgba(255,255,255,.09); }
    .survey-comment {
      width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:11px;padding:9px 11px;color:#e2e8f0;
      font-family:inherit;font-size:.8rem;resize:none;margin-bottom:10px;outline:none;
      transition:border-color .15s;
    }
    .survey-comment:focus         { border-color:rgba(139,92,246,.4); }
    .survey-comment::placeholder  { color:rgba(226,232,240,.28); }
    .survey-submit { background:linear-gradient(135deg,#6d28d9,#a855f7);border:none;border-radius:11px;padding:9px 24px;color:#fff;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s; }
    .survey-submit:disabled { opacity:.4;cursor:not-allowed; }
    .survey-done { font-size:.83rem;color:#4ade80;font-weight:700;display:none;padding:4px; }

    /* Loading / empty */
    .chat-loading { display:flex;justify-content:center;padding:50px 0; }
    .spin-ring    { width:30px;height:30px;border:3px solid rgba(139,92,246,.2);border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite; }
    .chat-empty        { text-align:center;padding:40px 20px; }
    .chat-empty-emoji  { font-size:2.4rem;margin-bottom:12px; }
    .chat-empty-title  { font-size:.93rem;font-weight:800;color:rgba(226,232,240,.6);margin-bottom:5px; }
    .chat-empty-sub    { font-size:.75rem;color:rgba(226,232,240,.32);line-height:1.55; }

    /* ── SCROLL TO BOTTOM BUTTON ─────────────────────── */
    #chatScrollBtn {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      right: 16px; z-index: 35;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(109,40,217,.92); border: 1.5px solid rgba(139,92,246,.45);
      color: #fff; font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
      opacity: 0; pointer-events: none;
      transform: translateY(10px) scale(.85);
      transition: opacity .22s, transform .22s;
    }
    #chatScrollBtn.visible { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    #chatScrollBtn:active  { transform: scale(.9); }

    /* ── IMAGE PREVIEW OVERLAY ───────────────────────── */
    #imgPreviewOverlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(3,0,14,.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    #imgPreviewOverlay.visible { opacity: 1; pointer-events: auto; }
    #imgPreviewContent {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    #imgPreviewEl {
      max-width: 100%; max-height: 52vh;
      border-radius: 16px; object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    #imgPreviewName {
      font-size: .78rem; color: rgba(226,232,240,.5);
      text-align: center; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .img-preview-actions {
      display: flex; gap: 10px; width: 100%;
    }
    .img-preview-btn {
      flex: 1; padding: 11px; border-radius: 13px; font-family: inherit;
      font-size: .87rem; font-weight: 700; cursor: pointer;
      border: none; transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .img-preview-btn:active { transform: scale(.96); }
    .img-preview-btn--cancel { background: rgba(255,255,255,.08); color: rgba(226,232,240,.8); border: 1px solid rgba(255,255,255,.1); }
    .img-preview-btn--send   { background: linear-gradient(135deg,#6d28d9,#a855f7); color: #fff; box-shadow: 0 2px 12px rgba(139,92,246,.3); }
    .img-preview-btn--send:hover { opacity: .9; }
    #imgPreviewCaption {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 13px; padding: 10px 14px;
      color: #e2e8f0; font-family: inherit; font-size: .87rem;
      resize: none; outline: none; line-height: 1.45;
      transition: border-color .15s;
    }
    #imgPreviewCaption::placeholder { color: rgba(148,163,184,.45); }
    #imgPreviewCaption:focus { border-color: rgba(139,92,246,.45); }

    /* ── QUICK REPLIES ────────────────────────────────── */
    #qrPanel {
      position: fixed;
      bottom: calc(62px + env(safe-area-inset-bottom, 0px));
      left: 0; right: 0;
      background: rgba(6,1,28,.97); border-top: 1px solid rgba(255,255,255,.07);
      padding: 9px 12px 11px;
      display: none; flex-direction: column; gap: 7px;
      z-index: 30;
    }
    #qrPanel.visible { display: flex; animation: qrSlide .18s cubic-bezier(.22,1,.36,1) both; }
    @keyframes qrSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .qr-panel-label { font-size:.6rem;font-weight:700;color:rgba(226,232,240,.28);text-transform:uppercase;letter-spacing:.08em; }
    .qr-chips { display:flex;flex-wrap:wrap;gap:6px; }
    .qr-chip {
      display:flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:20px;padding:6px 11px;
      font-size:.76rem;font-weight:600;color:rgba(226,232,240,.8);
      cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;
      transition:background .12s,border-color .12s;
    }
    .qr-chip:hover  { background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.3); }
    .qr-chip:active { background:rgba(139,92,246,.22);border-color:rgba(139,92,246,.4); }

    /* ── INPUT BAR ────────────────────────────────────── */
    #chatInputBar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      background: rgba(6,1,28,.98); border-top: 1px solid rgba(255,255,255,.07);
      z-index: 40;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 6px;
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.09);
      border-radius: 24px; padding: 5px 5px 5px 8px;
      transition: border-color .15s;
    }
    .input-row:focus-within { border-color: rgba(139,92,246,.45); }
    .input-icon {
      width:30px;height:30px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;border:none;background:none;
      -webkit-tap-highlight-color:transparent;
      transition:background .12s;
    }
    .input-icon:hover { background:rgba(255,255,255,.07); }
    .input-icon svg { width:18px;height:18px;fill:rgba(226,232,240,.38); }
    .chat-input {
      flex:1;background:none;border:none;outline:none;
      color:#e2e8f0;font-family:inherit;font-size:.87rem;
      line-height:1.45;resize:none;min-height:24px;max-height:110px;
      padding:4px 0;
    }
    .chat-input::placeholder { color:rgba(226,232,240,.28); }
    .chat-input:disabled     { opacity:.45; }
    .chat-send-btn {
      width:34px;height:34px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,#6d28d9,#a855f7);border:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 10px rgba(139,92,246,.35);
      -webkit-tap-highlight-color:transparent;
      transition:opacity .15s,transform .12s;
    }
    .chat-send-btn:active   { transform:scale(.9); }
    .chat-send-btn:disabled { opacity:.38;cursor:not-allowed;transform:none; }
    .chat-send-btn svg { width:15px;height:15px;fill:#fff;margin-left:2px; }

    /* ── TOAST ────────────────────────────────────────── */
    #chatToast {
      position: fixed;
      top: calc(68px + env(safe-area-inset-top, 0px)); left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: rgba(14,7,35,.97); border: 1px solid rgba(139,92,246,.28);
      border-radius: 22px; padding: 7px 16px;
      font-size: .76rem; font-weight: 600; color: rgba(226,232,240,.9);
      white-space: nowrap; z-index: 210; pointer-events: none;
      opacity: 0; transition: opacity .22s, transform .22s;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    #chatToast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #chatToast.t-error { border-color: rgba(239,68,68,.35); }
    #chatToast.t-ok    { border-color: rgba(74,222,128,.35); }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="vg-splash">
    <img id="vg-splash-logo" src="images/logo-virtual-login.png" alt="VirtualGift">
    <div id="vg-splash-name">VIRTUAL<span>GIFT</span></div>
    <div id="vg-splash-spinner"></div>
  </div>

  <!-- ── HEADER ──────────────────────────────────────── -->
  <header class="top-bar" role="banner">
    <button class="back-btn" onclick="window.chatGoBack()" aria-label="Volver">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="hdr-av" aria-hidden="true">
      <img src="images/logo soporte.png" alt="" onerror="this.style.opacity='0'">
      <span class="hdr-av-dot"></span>
    </div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdrName">Soporte VirtualGift</div>
      <div class="hdr-status" id="hdrStatusLine" role="status" aria-live="polite">
        <span class="hdr-status-dot" aria-hidden="true"></span>En línea
      </div>
    </div>
    <button class="hdr-home-btn" id="hdrHelpBtn" onclick="location.href=typeof withAppFlag==='function'?withAppFlag('inicio.html'):'inicio.html'" style="display:none" aria-label="Ir a inicio" title="Inicio">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
  </header>

  <!-- ── WELCOME VIEW ────────────────────────────────── -->
  <main id="helpView" role="main" aria-label="Soporte VirtualGift">
    <div class="welcome-av" aria-hidden="true">
      <img src="images/logo soporte.png" alt="" onerror="this.style.opacity='0'">
      <span class="welcome-av-dot"></span>
    </div>
    <h1 class="welcome-title">Soporte VirtualGift</h1>
    <p class="welcome-sub">Hola 👋 ¿En qué podemos<br>ayudarte hoy?</p>
    <div class="welcome-pill" role="status">
      <span class="welcome-pill-dot" aria-hidden="true"></span>
      Equipo en línea · ~5 min
    </div>
  </main>

  <!-- ── CHAT VIEW ────────────────────────────────────── -->
  <div id="chatView" role="main" aria-label="Chat de soporte" aria-live="polite">
    <div class="chat-content" id="chatContent">
      <div class="chat-loading"><div class="spin-ring" role="status" aria-label="Cargando…"></div></div>
    </div>
  </div>

  <!-- ── SCROLL TO BOTTOM BUTTON ─────────────────────── -->
  <button id="chatScrollBtn" aria-label="Ir al mensaje más reciente">↓</button>

  <!-- ── QUICK REPLIES PANEL ─────────────────────────── -->
  <div id="qrPanel" role="complementary" aria-label="Respuestas rápidas">
    <div class="qr-panel-label" aria-hidden="true">Respuestas rápidas</div>
    <div class="qr-chips">
      <button class="qr-chip" onclick="window.chatInsertQR('Tengo un problema con mi canje de premios. ¿Pueden ayudarme?')">🎁 Canje</button>
      <button class="qr-chip" onclick="window.chatInsertQR('Tengo un problema con un pago o cobro en mi cuenta.')">💰 Pago</button>
      <button class="qr-chip" onclick="window.chatInsertQR('Tengo una consulta sobre los sorteos de VirtualGift.')">🎟 Sorteos</button>
      <button class="qr-chip" onclick="window.chatInsertQR('Tengo problemas para acceder a mi cuenta de VirtualGift.')">👤 Mi cuenta</button>
      <button class="qr-chip" onclick="window.chatInsertQR('Quiero reportar un error técnico en la aplicación.')">⚙️ Error</button>
    </div>
  </div>

  <!-- ── INPUT BAR (always visible) ─────────────────── -->
  <div id="chatInputBar" role="region" aria-label="Escribir mensaje">
    <div class="input-row">
      <button class="input-icon" id="qrToggleBtn" onclick="window.chatToggleQR()" aria-label="Respuestas rápidas" title="Respuestas rápidas">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 9h-2V7h2m0 10h-2v-6h2m-1-9A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2z"/></svg>
      </button>
      <label class="input-icon" for="chatFileInput" aria-label="Adjuntar archivo" title="Adjuntar archivo">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6h-1.5v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S4 2.79 4 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
      </label>
      <input type="file" id="chatFileInput" accept="image/*,application/pdf,.doc,.docx,.zip,.txt,.xlsx,.csv" style="display:none" onchange="window.chatPickFile(this)" aria-hidden="true">
      <textarea class="chat-input" id="chatInput" placeholder="Escríbenos…" rows="1" maxlength="1000" aria-label="Escribe tu mensaje"></textarea>
      <button class="chat-send-btn" id="chatSendBtn" aria-label="Enviar mensaje">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- ── IMAGE PREVIEW OVERLAY ───────────────────────── -->
  <div id="imgPreviewOverlay" role="dialog" aria-modal="true" aria-label="Vista previa de imagen">
    <div id="imgPreviewContent">
      <img id="imgPreviewEl" src="" alt="Vista previa">
      <div id="imgPreviewName"></div>
      <textarea id="imgPreviewCaption" rows="2" maxlength="500"
        placeholder="Añade un comentario… (opcional)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();window.chatConfirmPreview()}"
      ></textarea>
      <div class="img-preview-actions">
        <button class="img-preview-btn img-preview-btn--cancel" onclick="window.chatCancelPreview()" type="button">Cancelar</button>
        <button class="img-preview-btn img-preview-btn--send"   onclick="window.chatConfirmPreview()" type="button">Enviar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="chatToast" role="alert" aria-live="assertive"></div>

  <script src="js/splash.js"></script>
</body>
</html>
