<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Chat Soporte — VirtualGift</title>
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/splash.css">
  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/chat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* html + body must both be height:100% for flex-child scroll to work */
    html {
      height: 100%;
      background: #03010f;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #03010f;
      color: #dcefff;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .top-bar {
      height: calc(60px + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: rgba(3,1,15,.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center; gap: 12px;
      padding-left: 12px; padding-right: 16px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background .15s;
    }
    .back-btn:active { background: rgba(255,255,255,.12); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(220,239,255,.85); }

    .chat-hdr-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .chat-hdr-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #4c1d95, #7c3aed);
      border: 2px solid rgba(139,92,246,.5);
      overflow: hidden; flex-shrink: 0;
    }
    .chat-hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-hdr-text { flex: 1; min-width: 0; }
    .chat-hdr-name {
      font-size: .9rem; font-weight: 800; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-hdr-status {
      font-size: .67rem; font-weight: 600; color: #4ade80;
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

    /* ── MESSAGES — the critical fix is min-height:0 ── */
    .chat-msgs {
      flex: 1;
      min-height: 0; /* ← without this, the div grows instead of scrolling */
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .chat-loading {
      display: flex; justify-content: center; align-items: center;
      padding: 48px; margin: auto;
    }
    .spin-ring {
      width: 32px; height: 32px;
      border: 3px solid rgba(139,92,246,.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chat-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 32px 20px; margin: auto;
    }
    .chat-empty-emoji { font-size: 3.2rem; margin-bottom: 14px; }
    .chat-empty-title { font-size: 1rem; font-weight: 800; color: rgba(220,239,255,.7); margin-bottom: 6px; }
    .chat-empty-sub { font-size: .78rem; color: rgba(220,239,255,.35); line-height: 1.55; }

    /* ── MESSAGE BUBBLES ── */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row--user  { justify-content: flex-end; }
    .msg-row--admin { justify-content: flex-start; }

    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 18px;
      font-size: .85rem; line-height: 1.5; word-break: break-word;
    }
    .bubble--user {
      background: linear-gradient(135deg, #6d28d9, #a855f7);
      color: #fff; border-bottom-right-radius: 4px;
      box-shadow: 0 2px 12px rgba(139,92,246,.3);
    }
    .bubble--admin {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(220,239,255,.9); border-bottom-left-radius: 4px;
    }
    .bubble--img { padding: 6px; }
    .msg-sender { font-size: .64rem; font-weight: 700; color: rgba(196,181,253,.6); margin-bottom: 3px; }
    .msg-time { font-size: .6rem; margin-top: 5px; opacity: .5; text-align: right; }
    .bubble--admin .msg-time { text-align: left; }

    /* Image messages */
    .msg-image {
      display: block; max-width: 100%; max-height: 280px;
      border-radius: 12px; cursor: zoom-in; object-fit: cover;
    }
    .msg-img-caption { font-size: .82rem; margin-top: 6px; padding: 0 2px; }

    /* Upload progress */
    .msg-uploading {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: rgba(220,239,255,.6);
      padding: 8px 14px;
    }
    .upload-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* ── INPUT BAR ── */
    .chat-input-bar {
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(3,1,15,.97);
      border-top: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex; align-items: flex-end; gap: 8px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 26px;
      padding: 6px 6px 6px 14px;
      transition: border-color .15s;
    }
    .chat-input-row:focus-within { border-color: rgba(139,92,246,.45); }

    .chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: #dcefff; font-family: inherit; font-size: .88rem;
      line-height: 1.45; resize: none;
      min-height: 24px; max-height: 120px; padding: 4px 0;
    }
    .chat-input::placeholder { color: rgba(220,239,255,.3); }

    /* Image attach button */
    .chat-img-label {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .chat-img-label:hover { background: rgba(255,255,255,.08); }
    .chat-img-label svg { width: 20px; height: 20px; fill: rgba(220,239,255,.4); }

    .chat-send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #6d28d9, #a855f7);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
      box-shadow: 0 2px 8px rgba(139,92,246,.35);
    }
    .chat-send-btn:active { transform: scale(.93); }
    .chat-send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .chat-send-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 2px; }

    /* ── CHAT CLOSED ── */
    .chat-closed-banner {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 12px; padding: 10px 14px;
      font-size: .78rem; color: rgba(252,165,165,.8);
      text-align: center; margin: 0 4px 8px; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="vg-splash">
    <img id="vg-splash-logo" src="images/logo-virtual-login.png" alt="VirtualGift">
    <div id="vg-splash-name">VIRTUAL<span>GIFT</span></div>
    <div id="vg-splash-spinner"></div>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <button class="back-btn" id="chatBackBtn" aria-label="Volver">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="chat-hdr-info">
      <div class="chat-hdr-avatar">
        <img src="images/logo-virtual-login.png" alt="Soporte">
      </div>
      <div class="chat-hdr-text">
        <div class="chat-hdr-name">Soporte VirtualGift</div>
        <div class="chat-hdr-status" id="chatStatusLine">
          <span class="status-dot"></span>En línea
        </div>
      </div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-msgs" id="chatMsgs">
    <div class="chat-loading"><div class="spin-ring"></div></div>
  </div>

  <!-- INPUT BAR -->
  <div class="chat-input-bar" id="chatInputBar">
    <div class="chat-input-row">
      <!-- Image attach -->
      <label class="chat-img-label" for="chatImageInput" title="Enviar imagen">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </label>
      <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="window.chatPickImage(this)">

      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Escribe un mensaje..."
        rows="1"
        maxlength="1000"
      ></textarea>

      <button class="chat-send-btn" id="chatSendBtn" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script src="js/splash.js"></script>
</body>
</html>
