  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Noticia - VirtualGift</title>
  <meta name="description" content="Lee las últimas noticias y novedades de VirtualGift.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/splash.css">
  <link rel="stylesheet" href="css/news-vg.css">
  <link rel="stylesheet" href="css/header.css"> <!-- ✅ Header compartido -->

  <script defer src="js/app-mode.js"></script>

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

  <div id="vg-splash">
    <img id="vg-splash-logo" src="images/logo-virtual-login.png" alt="VirtualGift">
    <div id="vg-splash-name">VIRTUAL<span>GIFT</span></div>
    <div id="vg-splash-spinner"></div>
  </div>


  <!-- ✅ HEADER COMPARTIDO -->
  <header class="header">
    <div class="logo">
      <img src="images/logo-virtual-login.png" alt="VirtualGift Logo" class="logo-image">
      <span class="logo-text">VIRTUAL<span class="logo-studios">GIFT</span></span>
    </div>
    <div class="header-icons">
      <div class="icon-users" onclick="window.location.href=withAppFlag('home.html')" style="cursor:pointer;" role="button" aria-label="Ir a mi perfil">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="icon-coin" onclick="window.location.href=withAppFlag('puntos.html')" style="cursor:pointer;" role="button" aria-label="Ver mis puntos">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="#FDB813"/>
          <defs><radialGradient id="cg"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#FFA500"/></radialGradient></defs>
          <circle cx="50" cy="50" r="42" fill="url(#cg)"/>
          <path d="M 30 30 L 42 65 L 50 65 L 58 65 L 70 30 L 62 30 L 54 57 L 50 57 L 46 57 L 38 30 Z" fill="#FFFACD"/>
        </svg>
      </div>
      <div class="icon-notification" onclick="window.location.href=withAppFlag('notificaciones.html')" style="cursor:pointer;" role="button" aria-label="Ver notificaciones">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="notification-badge" id="badgeCount" style="display:none;">0</span>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Skeleton mientras carga -->
    <div class="article-skeleton visible" id="articleSkeleton">
      <div class="skeleton-cover"></div>
      <div class="skeleton-body">
        <div class="skeleton-meta"></div>
        <div class="skeleton-title"></div>
        <div class="skeleton-title-2"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line--short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line--shorter"></div>
      </div>
    </div>

    <!-- Artículo real -->
    <div class="article-card news-hidden" id="articleCard">
      <div class="article-header">
        <img id="headerImage" class="header-image news-hidden" alt="Imagen principal de la noticia" />
        <div class="header-fallback" id="headerFallback">
          <img src="images/logo-virtual-login.png" alt="VirtualGift" />
          <span>VIRTUAL<em>GIFT</em></span>
        </div>
      </div>

      <div class="article-content">
        <div class="article-meta">
          <span class="status-badge news-hidden" id="statusBadge">
            <span class="status-dot"></span>
            <span id="statusText">Noticia</span>
          </span>
          <span class="category-badge" id="categoryText">Gaming</span>
          <span class="date-text" id="dateText">—</span>
        </div>

        <h1 id="titleText"></h1>

        <div class="article-body" id="blocksContainer"></div>

        <div class="ads-container">
          <ins class="adsbygoogle"
               data-ad-client="ca-pub-1930529129644930"
               data-ad-slot="4852490161"
               data-ad-format="fluid"
               data-ad-layout="in-article"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div id="galleryContainer" class="gallery news-hidden"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.waitForFirebase(function () {
        var auth = window.auth || firebase.auth();
        auth.onAuthStateChanged(function (user) {
          if (!user) { window.location.href = withAppFlag('index.html'); return; }
          if (!user.emailVerified && user.providerData?.[0]?.providerId === 'password') {
            window.location.href = withAppFlag('verify-pending.html');
          }
        });
      });
    });
  </script>
  <script defer src="js/notification-badge.js"></script>
  <script defer src="js/news-detail-vg.js"></script>
  <script defer src="js/bottom-nav.js"></script>
  <script src="js/splash.js"></script>
</body>
</html>
