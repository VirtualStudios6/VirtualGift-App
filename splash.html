<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03010f">
  <title>VirtualGift</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw; height: 100dvh;
      background: #03010f;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-user-select: none; user-select: none;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 15%, rgba(139,92,246,.28) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(168,85,247,.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 15% 75%, rgba(99,40,217,.10) 0%, transparent 55%);
      animation: bgBreath 3s ease-in-out infinite alternate;
    }
    @keyframes bgBreath {
      0%   { opacity: .7; }
      100% { opacity: 1;  }
    }

    /* ── PARTICLES ── */
    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .pt {
      position: absolute; border-radius: 50%;
      animation: ptRise linear infinite; opacity: 0;
      will-change: transform, opacity;
    }
    @keyframes ptRise {
      0%   { transform: translateY(0)       scale(0);   opacity: 0; }
      6%   { opacity: 1; }
      94%  { opacity: .55; }
      100% { transform: translateY(-115vh)  scale(1.3); opacity: 0; }
    }

    /* ── CENTER ── */
    .center {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: relative;
      animation: logoIn .95s cubic-bezier(.34,1.56,.64,1) .15s both;
      will-change: transform, opacity;
    }
    @keyframes logoIn {
      from { transform: scale(0) rotate(-18deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .logo-ring {
      position: absolute; inset: -12px;
      border-radius: 40px;
      border: 2px solid rgba(168,85,247,.55);
      will-change: opacity, transform;
      animation: ringPulse 2.2s ease-in-out 1.3s infinite;
    }
    .logo-ring-2 {
      position: absolute; inset: -24px;
      border-radius: 52px;
      border: 1px solid rgba(168,85,247,.2);
      will-change: opacity, transform;
      animation: ringPulse 2.2s ease-in-out 1.6s infinite;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: .35; transform: scale(.97); }
      50%       { opacity: 1;   transform: scale(1.03); }
    }

    .logo-img {
      width: 100px; height: 100px;
      border-radius: 28px; display: block;
      box-shadow:
        0 0 50px rgba(168,85,247,.65),
        0 0 100px rgba(168,85,247,.22),
        0 8px 32px rgba(0,0,0,.5);
    }

    /* ── APP NAME ── */
    .app-name {
      display: flex; align-items: baseline;
      margin-top: 30px;
      font-size: 2.1rem; font-weight: 900;
      letter-spacing: -.04em;
      animation: slideUp .75s cubic-bezier(.34,1.2,.64,1) .9s both;
      will-change: transform, opacity;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .nv { color: #fff; }
    .ng {
      background: linear-gradient(135deg, #ffc837 0%, #ff8fd8 50%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-size: .7rem; font-weight: 700;
      color: rgba(196,181,253,.5);
      letter-spacing: .26em; text-transform: uppercase;
      margin-top: 9px;
      animation: slideUp .6s ease 1.2s both;
    }

    /* ── COINS ── */
    .coins {
      display: flex; gap: 16px;
      margin-top: 48px;
      animation: slideUp .5s ease 1.5s both;
    }
    .coin {
      font-size: 1.55rem;
      filter: drop-shadow(0 0 7px rgba(255,200,55,.55));
      will-change: transform;
      animation: coinWave 1.3s ease-in-out infinite;
    }
    .coin:nth-child(1) { animation-delay: 1.80s; }
    .coin:nth-child(2) { animation-delay: 1.96s; }
    .coin:nth-child(3) { animation-delay: 2.12s; }
    .coin:nth-child(4) { animation-delay: 2.28s; }
    .coin:nth-child(5) { animation-delay: 2.44s; }
    @keyframes coinWave {
      0%, 100% { transform: translateY(0);   }
      42%       { transform: translateY(-9px); }
    }

    /* ── PROGRESS BAR ── */
    .prog-wrap {
      margin-top: 52px;
      width: 170px; height: 3px;
      background: rgba(139,92,246,.15);
      border-radius: 999px; overflow: hidden;
      animation: fadeIn .4s ease 1.7s both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .prog-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a855f7, #e879f9, #fbbf24);
      border-radius: inherit;
      /* empieza a los 1.75s, dura 3.25s → completa exacto a los 5s */
      animation: progFill 3.25s cubic-bezier(.4,0,.15,1) 1.75s both;
    }
    @keyframes progFill { from { width: 0%; } to { width: 100%; } }

    /* ── FADE OUT ── */
    body.splash-out {
      animation: splashFadeOut .55s ease forwards;
    }
    @keyframes splashFadeOut { to { opacity: 0; } }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="particles" id="pts"></div>

  <div class="center">

    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-ring-2"></div>
      <img class="logo-img" src="images/logo-virtual-login.png" alt="VirtualGift">
    </div>

    <div class="app-name">
      <span class="nv">VIRTUAL</span><span class="ng">GIFT</span>
    </div>
    <p class="tagline">Rewards &amp; Sorteos</p>

    <div class="coins">
      <span class="coin">🪙</span>
      <span class="coin">🎁</span>
      <span class="coin">⭐</span>
      <span class="coin">🎁</span>
      <span class="coin">🪙</span>
    </div>

    <div class="prog-wrap">
      <div class="prog-bar"></div>
    </div>

  </div>

  <script>
    // ── Partículas flotantes ──
    (function () {
      var C = document.getElementById('pts');
      for (var i = 0; i < 22; i++) {
        var el = document.createElement('div');
        el.className = 'pt';
        var size = (Math.random() * 5 + 2).toFixed(1);
        var isPurple = Math.random() > .45;
        el.style.cssText = [
          'width:'  + size + 'px',
          'height:' + size + 'px',
          'left:'   + (Math.random() * 100).toFixed(1) + '%',
          'bottom:' + (Math.random() * 15).toFixed(1) + '%',
          'background:' + (isPurple ? 'rgba(168,85,247,.7)' : 'rgba(255,200,55,.6)'),
          'animation-duration:' + (Math.random() * 5 + 6).toFixed(1) + 's',
          'animation-delay:'    + (Math.random() * 5).toFixed(1) + 's'
        ].join(';');
        C.appendChild(el);
      }
    })();

    // ── Redirect tras animación ──
    // progress bar: 1.75s inicio + 3.25s duración = 5.0s completado
    // fade out a los 5.0s, redirect a los 5.55s
    setTimeout(function () {
      document.body.classList.add('splash-out');
      setTimeout(function () {
        window.location.replace('login.html');
      }, 550);
    }, 5000);
  </script>

</body>
</html>
