<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">
  <title>Ofertas — VirtualGift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/splash.css">
  <link rel="stylesheet" href="css/bottom-nav.css">

  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/sounds.js"></script>
  <script defer src="js/unity-ads.js"></script>
  <script defer src="js/unity-banner.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #02050f;
      color: white;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    .of-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      flex-shrink: 0;
      background: rgba(2,5,21,0.98);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 20;
    }
    .of-back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .of-back svg { width: 18px; height: 18px; fill: white; }
    .of-title {
      flex: 1;
      font-size: 17px;
      font-weight: 800;
      color: white;
    }
    .of-coins {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,200,55,0.1);
      border: 1px solid rgba(255,200,55,0.22);
      border-radius: 20px;
      padding: 5px 12px;
    }
    .of-coins-icon { font-size: 15px; }
    .of-coins-val  { font-size: 14px; font-weight: 800; color: #ffc837; }

    /* ── Provider tabs ───────────────────────────── */
    .of-tabs {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      overflow-x: auto;
    }
    .of-tabs { -ms-overflow-style: none; }
    .of-tabs::-webkit-scrollbar { display: none; }
    .of-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      height: 48px;
      flex-shrink: 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }
    .of-tab-emoji { font-size: 16px; }
    .of-tab-name  { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.45); white-space: nowrap; }
    .of-tab-badge {
      font-size: 9px; font-weight: 800;
      padding: 2px 6px; border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.4);
    }
    .of-tab.active { border-bottom-color: #00d4ff; }
    .of-tab.active .of-tab-name  { color: #00d4ff; }
    .of-tab.active .of-tab-badge { background: rgba(0,212,255,0.12); color: #00d4ff; }

    /* ── Content area ────────────────────────────── */
    .of-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .of-panel {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
    }
    .of-panel.active { display: flex; }

    /* iframe fills panel */
    .of-iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .of-iframe-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Loading state ───────────────────────────── */
    .of-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #02050f;
      z-index: 5;
      transition: opacity 0.3s;
    }
    .of-loading.hidden { opacity: 0; pointer-events: none; }
    .of-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .of-loading-name  { font-size: 15px; font-weight: 800; color: white; }
    .of-loading-sub   { font-size: 12px; color: rgba(255,255,255,0.35); }

    /* ── Dev / not-verified notice ───────────────── */
    .of-notice {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 24px;
      text-align: center;
      height: 100%;
    }
    .of-notice-emoji { font-size: 48px; }
    .of-notice-title { font-size: 16px; font-weight: 800; color: white; }
    .of-notice-desc  { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.7; max-width: 280px; }

    /* ── Toast ───────────────────────────────────── */
    .of-toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e1b4b;
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 12px;
      padding: 11px 20px;
      font-size: 13px; font-weight: 700; color: white;
      opacity: 0; transition: all 0.3s;
      z-index: 9999; white-space: nowrap;
      pointer-events: none;
    }
    .of-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="vg-splash">
    <img id="vg-splash-logo" src="images/logo-virtual-login.png" alt="VirtualGift">
    <div id="vg-splash-name">VIRTUAL<span>GIFT</span></div>
    <div id="vg-splash-spinner"></div>
  </div>

  <!-- Header -->
  <header class="of-header">
    <div class="of-back" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <span class="of-title">Ofertas</span>
    <div class="of-coins">
      <span class="of-coins-icon">🪙</span>
      <span class="of-coins-val" id="ofCoins">---</span>
    </div>
  </header>

  <!-- Provider tabs -->
  <nav class="of-tabs">
    <div class="of-tab active" id="tab-cpx" onclick="switchWall('cpx', this)">
      <span class="of-tab-emoji">📊</span>
      <span class="of-tab-name">CPX Research</span>
      <span class="of-tab-badge">Encuestas</span>
    </div>
    <div class="of-tab" id="tab-offermaru" onclick="switchWall('offermaru', this)">
      <span class="of-tab-emoji">🏆</span>
      <span class="of-tab-name">Offermaru</span>
      <span class="of-tab-badge">Ofertas</span>
    </div>
    <div class="of-tab" id="tab-tapjoy" onclick="switchWall('tapjoy', this)">
      <span class="of-tab-emoji">🎯</span>
      <span class="of-tab-name">Tapjoy</span>
      <span class="of-tab-badge">Ofertas</span>
    </div>
  </nav>

  <!-- Content -->
  <main class="of-content">

    <!-- CPX panel -->
    <div class="of-panel active" id="panel-cpx">
      <div class="of-iframe-wrap" id="cpxWrap">
        <div class="of-loading" id="cpxLoading">
          <div class="of-spinner"></div>
          <div class="of-loading-name">CPX Research</div>
          <div class="of-loading-sub">Cargando encuestas...</div>
        </div>
      </div>
    </div>

    <!-- Offermaru panel -->
    <div class="of-panel" id="panel-offermaru">
      <div class="of-iframe-wrap" id="offermaruWrap">
        <div class="of-loading" id="offermaruLoading">
          <div class="of-spinner"></div>
          <div class="of-loading-name">Offermaru</div>
          <div class="of-loading-sub">Cargando ofertas...</div>
        </div>
      </div>
    </div>

    <!-- Tapjoy panel -->
    <div class="of-panel" id="panel-tapjoy">
      <div class="of-iframe-wrap" id="tapjoyWrap">
        <div class="of-loading" id="tapjoyLoading">
          <div class="of-spinner"></div>
          <div class="of-loading-name">Tapjoy</div>
          <div class="of-loading-sub">Cargando ofertas...</div>
        </div>
      </div>
    </div>

  </main>

  <div class="of-toast" id="ofToast"></div>

  <script defer src="js/bottom-nav.js"></script>
  <script src="js/splash.js"></script>

  <script>
    // ── Constants ─────────────────────────────────────────────────────────────
    const CPX_APP_ID           = 32955;
    const CPX_HASH_KEY         = 'KwYa4M02A8kLxYbzXXstl4FUGkfgxdHG';
    const OFFERMARU_WALL_URL   = 'https://wall.offermaru.com/19978';
    const TAPJOY_SDK_KEY       = '86CtElNPRreaGQITdKssFAECcaiMFmeHY7O8teeqFsNz3Y6-_tRPzHC3qw54';

    let currentUser      = null;
    let cpxLoaded        = false;
    let offermaruLoaded  = false;
    let tapjoyLoaded     = false;

    // ── Tab switcher ──────────────────────────────────────────────────────────
    function switchWall(id, el) {
      document.querySelectorAll('.of-panel').forEach(function(p){ p.classList.remove('active'); });
      document.querySelectorAll('.of-tab').forEach(function(t){ t.classList.remove('active'); });
      var panel = document.getElementById('panel-' + id);
      if (panel) panel.classList.add('active');
      if (el)    el.classList.add('active');
      if (id === 'cpx'       && currentUser && !cpxLoaded)       loadCPXWall(currentUser);
      if (id === 'offermaru' && currentUser && !offermaruLoaded) loadOffermaruWall(currentUser);
      if (id === 'tapjoy'    && currentUser && !tapjoyLoaded)    loadTapjoyWall(currentUser);
    }

    // ── CPX Research ──────────────────────────────────────────────────────────
    function loadCPXWall(user) {
      if (cpxLoaded || typeof md5 === 'undefined') return;
      cpxLoaded = true;
      var hash   = md5(user.uid + CPX_HASH_KEY);
      var uname  = encodeURIComponent(user.displayName || 'User');
      var email  = encodeURIComponent(user.email || '');
      var uid    = encodeURIComponent(user.uid);
      var url    = 'https://offers.cpx-research.com/index.php'
                 + '?app_id='      + CPX_APP_ID
                 + '&ext_user_id=' + uid
                 + '&username='    + uname
                 + '&email='       + email
                 + '&secure_hash=' + hash;
      var wrap    = document.getElementById('cpxWrap');
      var loading = document.getElementById('cpxLoading');
      if (!wrap) return;
      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.setAttribute('allowfullscreen', '');
      iframe.onload = function() {
        if (loading) loading.classList.add('hidden');
      };
      wrap.appendChild(iframe);
    }

    // ── Offermaru ─────────────────────────────────────────────────────────────
    function loadOffermaruWall(user) {
      if (offermaruLoaded) return;
      offermaruLoaded = true;
      var wrap    = document.getElementById('offermaruWrap');
      var loading = document.getElementById('offermaruLoading');
      if (!wrap) return;

      var url = OFFERMARU_WALL_URL + '?user_id=' + encodeURIComponent(user.uid);
      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.setAttribute('allowfullscreen', '');
      iframe.onload = function() {
        if (loading) loading.classList.add('hidden');
      };
      wrap.appendChild(iframe);
    }

    // ── Tapjoy ───────────────────────────────────────────────────────────────
    // Offerwall URL: https://offerwall.tapjoy.com/web/v1/
    //   ?app_id={APP_ID}
    //   &publisher_user_id={user.uid}
    //   &sdk_key={SDK_KEY}
    // El secure_hash (SHA-256) se genera server-side si Tapjoy lo exige;
    // con iFrame público basta app_id + publisher_user_id en muchos planes.
    function loadTapjoyWall(user) {
      if (tapjoyLoaded) return;
      tapjoyLoaded = true;
      var wrap    = document.getElementById('tapjoyWrap');
      var loading = document.getElementById('tapjoyLoading');
      if (!wrap) return;

      var uid = encodeURIComponent(user.uid);
      var url = 'https://offerwall.tapjoy.com/web/v1/'
              + '?sdk_key='            + encodeURIComponent(TAPJOY_SDK_KEY)
              + '&publisher_user_id='  + uid;

      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.setAttribute('allowfullscreen', '');
      iframe.onload = function() {
        if (loading) loading.classList.add('hidden');
      };
      wrap.appendChild(iframe);
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg) {
      var t = document.getElementById('ofToast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2800);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    function waitForFirebase(cb, max) {
      max = max || 80; var i = 0;
      var t = setInterval(function() {
        i++;
        if (typeof firebase !== 'undefined' && typeof firebase.auth === 'function' && window.db) {
          clearInterval(t); cb();
        } else if (i >= max) clearInterval(t);
      }, 100);
    }

    window.addEventListener('load', function() {
      waitForFirebase(function() {
        firebase.auth().onAuthStateChanged(async function(user) {
          if (!user) { window.location.href = withAppFlag('login.html'); return; }
          if (!user.emailVerified && user.providerData?.[0]?.providerId === 'password') {
            window.location.href = withAppFlag('verify-pending.html'); return;
          }
          currentUser = user;

          // Cargar balance
          try {
            var snap = await window.db.collection('users').doc(user.uid).get();
            document.getElementById('ofCoins').textContent =
              ((snap.data() && snap.data().points) || 0).toLocaleString();
          } catch(e) {}

          // Abrir tab según hash de URL
          if (location.hash === '#offermaru') {
            switchWall('offermaru', document.getElementById('tab-offermaru'));
          } else if (location.hash === '#tapjoy') {
            switchWall('tapjoy', document.getElementById('tab-tapjoy'));
          } else {
            loadCPXWall(user);
          }
        });
      });
    });
  </script>
</body>
</html>
