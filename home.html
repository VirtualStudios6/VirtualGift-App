<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06011c" />
  <title>Mi Perfil - VirtualGift</title>

  <script defer src="js/app-mode.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/header.css">

  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script defer src="js/firebase-config.js"></script>

</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="images/logo-virtual-login.png" alt="VirtualGift Logo" class="logo-image" />
      <span class="logo-text">VIRTUAL<span class="logo-studios">GIFT</span></span>
    </div>
    <div class="header-icons">
      <div class="icon-users" onclick="window.location.href=withAppFlag('home.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="icon-coin" onclick="window.location.href=withAppFlag('puntos.html')" style="cursor:pointer;">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="#FDB813"/>
          <defs>
            <radialGradient id="coinGradient">
              <stop offset="0%"   style="stop-color:#FFD700;stop-opacity:1"/>
              <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="42" fill="url(#coinGradient)"/>
          <path d="M 30 30 L 42 65 L 50 65 L 58 65 L 70 30 L 62 30 L 54 57 L 50 57 L 46 57 L 38 30 Z" fill="#FFFACD"/>
        </svg>
      </div>
      <div class="icon-notification" onclick="window.location.href=withAppFlag('notificaciones.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="notification-badge" id="badgeCount" style="display:none;">0</span>
      </div>
    </div>
  </header>

  <!-- LOADING -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando perfil...</p>
  </div>

  <!-- ERROR -->
  <div id="error" class="error-state">
    <div class="error-icon">⚠️</div>
    <div class="error-message">
      <p>No se pudo cargar tu perfil</p>
      <p style="font-size:0.9em;margin-top:6px;">Verifica tu conexión e intenta de nuevo</p>
    </div>
    <button class="btn btn-primary" onclick="location.reload()">🔄 Reintentar</button>
    <button class="btn" onclick="window.location.href=withAppFlag('inicio.html')" style="margin-top:10px;">← Volver al inicio</button>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <!-- ✅ FIX: clase "hidden" en vez de style="display:none" para que el CSS desktop pueda aplicar display:flex -->
  <div id="content" class="container page-content hidden">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href=withAppFlag('inicio.html')">
        ← Volver al inicio
      </button>
    </div>

    <!-- SIDEBAR: tarjeta de perfil -->
    <div class="profile-card">
      <div class="profile-row">
        <div class="avatar-wrap">
          <img id="avatar" class="avatar" src="images/logo-virtual-login.png" alt="Avatar" />
          <button id="btnEditAvatar" class="edit-avatar-btn" title="Cambiar avatar" aria-label="Cambiar avatar">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 20H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L8 18l-4 1 1-4L16.5 3.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="profile-meta">
          <div class="user-name" id="userName">Usuario</div>
          <div class="email-row">
            <div class="user-email" id="userEmail" title="Correo electrónico"></div>
            <button id="btnToggleEmail" class="icon-btn" title="Mostrar/Ocultar correo" aria-label="Mostrar u ocultar correo">
              <svg id="eyeOpen" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg id="eyeClosed" style="display:none;" viewBox="0 0 24 24" fill="none">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.88 21.88 0 0 1 5.06-6.94" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 1l22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.87 21.87 0 0 1-2.98 4.33" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="hint">
        <span class="chip" id="chipProvider">🔐 Cuenta segura</span>
        <span class="chip">⚡ Perfil sincronizado</span>
      </div>
    </div>

    <!-- COLUMNA DERECHA: secciones -->
    <div id="sections-wrap">

      <!-- Acciones -->
      <div class="section">
        <h2 class="section-title">⚡ Acciones</h2>
        <div class="action-buttons">
          <button class="btn" id="btnEditName">✏️ Cambiar nombre</button>
          <button class="btn btn-warning" id="btnResetPassword">🔑 Cambiar contraseña</button>
          <button class="btn btn-danger" id="btnLogout">🚪 Cerrar Sesión</button>
        </div>
      </div>

      <!-- Referidos -->
      <div class="section" id="referralSection">
        <h2 class="section-title">🎁 Invita amigos</h2>
        <p class="referral-desc">Comparte tu código. Ambos ganan <strong>+500 coins</strong> al registrarse.</p>
        <div class="referral-row">
          <span class="referral-code" id="referralCode">—</span>
          <button type="button" class="btn referral-copy-btn" id="btnCopyReferral">📋 Copiar enlace</button>
        </div>
        <p class="referral-copied" id="referralCopied">¡Enlace copiado!</p>
        <p class="referral-stats" id="referralStats"></p>
      </div>

      <!-- Notificaciones push -->
      <div class="section">
        <h2 class="section-title">🔔 Notificaciones push</h2>
        <div class="action-buttons">
          <button type="button" class="btn" id="btnPush"
            onclick="togglePushNotifications(window.auth?.currentUser?.uid)">
            🔔 Activar notificaciones push
          </button>
        </div>
      </div>

      <!-- Soporte -->
      <div class="section">
        <h2 class="section-title">🛟 Soporte</h2>
        <div class="action-buttons">
          <button class="btn" id="btnReport">🐛 Reportar un problema</button>
          <button class="btn btn-ghost-danger" id="btnDeleteAccount">Eliminar mi cuenta</button>
        </div>
      </div>

    </div><!-- /sections-wrap -->

  </div><!-- /content -->

  <div id="toast" class="toast"></div>
  <input id="avatarInput" type="file" accept="image/*" style="display:none;" />

  <style>
    .referral-desc       { font-size: 13px; color: rgba(255,255,255,.6); margin: 0 0 12px; line-height: 1.5; }
    .referral-desc strong{ color: #ffc837; }
    .referral-row        { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .referral-code       { font-size: 20px; font-weight: 900; letter-spacing: .12em; color: #a78bfa; background: rgba(139,92,246,.12); border: 1px solid rgba(139,92,246,.3); border-radius: 10px; padding: 8px 16px; flex-shrink: 0; }
    .referral-copy-btn   { font-size: 13px; padding: 8px 14px; }
    .referral-copied     { font-size: 12px; color: #22c55e; margin: 6px 0 0; display: none; }
    .referral-stats      { font-size: 12px; color: rgba(255,255,255,.4); margin: 6px 0 0; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js" defer></script>
  <script defer src="js/notification-badge.js"></script>
  <script defer src="js/deleteUserData.js"></script>
  <script defer src="js/push-notifications.js"></script>
  <script defer src="js/profile.js"></script>
</body>
</html>
