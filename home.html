<!DOCTYPE html>
<html lang="es">
<head>
      <style>.adsbygoogle{display:block}.ads-container{margin:16px 0;overflow:hidden;text-align:center}</style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1930529129644930" crossorigin="anonymous"></script>
  <script src="https://quge5.com/88/tag.min.js" data-zone="227397" async data-cfasync="false"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06011c" />
  <title>Mi Perfil - VirtualGift</title>

  <script defer src="js/app-mode.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/header.css">

  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>.lucide{width:1em;height:1em;vertical-align:-0.125em;display:inline-block}.icon-lg{width:2rem !important;height:2rem !important}.icon-xl{width:3rem !important;height:3rem !important}</style>

</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="images/logo-virtual-login.png" alt="VirtualGift Logo" class="logo-image" />
      <span class="logo-text">VIRTUAL<span class="logo-studios">GIFT</span></span>
    </div>
    <div class="header-icons">
      <div class="icon-users" onclick="window.location.href=withAppFlag('home.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="icon-coin" onclick="window.location.href=withAppFlag('puntos.html')" style="cursor:pointer;">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="#FDB813"/>
          <defs>
            <radialGradient id="coinGradient">
              <stop offset="0%"   style="stop-color:#FFD700;stop-opacity:1"/>
              <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="42" fill="url(#coinGradient)"/>
          <path d="M 30 30 L 42 65 L 50 65 L 58 65 L 70 30 L 62 30 L 54 57 L 50 57 L 46 57 L 38 30 Z" fill="#FFFACD"/>
        </svg>
      </div>
      <div class="icon-notification" onclick="window.location.href=withAppFlag('notificaciones.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="notification-badge" id="badgeCount" style="display:none;">0</span>
      </div>
    </div>
  </header>

  <!-- LOADING -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando perfil...</p>
  </div>

  <!-- ERROR -->
  <div id="error" class="error-state">
    <div class="error-icon"><i data-lucide="alert-triangle" class="icon-lg"></i></div>
    <div class="error-message">
      <p>No se pudo cargar tu perfil</p>
      <p style="font-size:0.9em;margin-top:6px;">Verifica tu conexión e intenta de nuevo</p>
    </div>
    <button class="btn btn-primary" onclick="location.reload()"><i data-lucide="refresh-cw"></i> Reintentar</button>
    <button class="btn" onclick="window.location.href=withAppFlag('inicio.html')" style="margin-top:10px;">← Volver al inicio</button>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <!-- ✅ FIX: clase "hidden" en vez de style="display:none" para que el CSS desktop pueda aplicar display:flex -->
  <div id="content" class="container page-content hidden">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href=withAppFlag('inicio.html')">
        ← Volver al inicio
      </button>
    </div>

    <!-- SIDEBAR: tarjeta de perfil -->
    <div class="profile-card">
      <div class="profile-row">
        <div class="avatar-wrap">
          <img id="avatar" class="avatar" src="images/logo-virtual-login.png" alt="Avatar" />
          <button id="btnEditAvatar" class="edit-avatar-btn" title="Cambiar avatar" aria-label="Cambiar avatar">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 20H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L8 18l-4 1 1-4L16.5 3.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="profile-meta">
          <div class="user-name" id="userName">Usuario</div>
          <div class="email-row">
            <div class="user-email" id="userEmail" title="Correo electrónico"></div>
            <button id="btnToggleEmail" class="icon-btn" title="Mostrar/Ocultar correo" aria-label="Mostrar u ocultar correo">
              <svg id="eyeOpen" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg id="eyeClosed" style="display:none;" viewBox="0 0 24 24" fill="none">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.88 21.88 0 0 1 5.06-6.94" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 1l22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.87 21.87 0 0 1-2.98 4.33" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14.12 14.12a3 3 0 0 1-4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="hint">
        <span class="chip" id="chipProvider"><i data-lucide="shield-check"></i> Cuenta segura</span>
        <span class="chip"><i data-lucide="zap"></i> Perfil sincronizado</span>
      </div>
    </div>

    <!-- COLUMNA DERECHA: secciones -->
    <div id="sections-wrap">

      <!-- Acciones -->
      <div class="section">
        <h2 class="section-title"><i data-lucide="zap"></i> Acciones</h2>
        <div class="action-buttons">
          <button class="btn" id="btnEditName"><i data-lucide="pencil"></i> Cambiar nombre</button>
          <button class="btn btn-warning" id="btnResetPassword"><i data-lucide="key-round"></i> Cambiar contraseña</button>
          <button class="btn btn-danger" id="btnLogout"><i data-lucide="log-out"></i> Cerrar Sesión</button>
        </div>
      </div>

      <!-- Referidos -->
      <div class="section ref-section ref-section--hidden" id="referralSection">
        <h2 class="section-title"><i data-lucide="users"></i> Invita amigos</h2>

        <!-- Tarjeta del código -->
        <div class="ref-code-card">
          <div class="ref-code-label">Tu código de invitación</div>
          <div class="ref-code-inner">
            <span class="ref-code-value" id="referralCode">—</span>
            <button class="ref-copy-icon-btn" id="btnCopyCode" aria-label="Copiar código">
              <i data-lucide="copy"></i>
            </button>
          </div>
          <div class="ref-reward-badge">
            <i data-lucide="coins" class="ref-coin-icon"></i>
            Ambos ganan +500 coins
          </div>
        </div>

        <!-- Botones de acción -->
        <div class="ref-btn-row">
          <button class="btn btn-primary ref-btn" id="btnShareReferral">
            <i data-lucide="share-2"></i> Compartir
          </button>
          <button class="btn ref-btn" id="btnCopyReferral">
            <i data-lucide="link-2"></i> Copiar enlace
          </button>
        </div>

        <!-- Feedback -->
        <p class="referral-copied" id="referralCopied">
          <i data-lucide="check-circle" class="ref-check-icon"></i> ¡Enlace copiado!
        </p>
        <p class="referral-stats" id="referralStats"></p>

        <!-- Ingresar código de otro usuario (si no ha sido referido aún) -->
        <div class="ref-enter-wrap ref-enter-wrap--hidden" id="refEnterWrap">
          <div class="ref-enter-divider"><span>¿Te invitó alguien?</span></div>
          <div class="ref-enter-row">
            <input type="text" id="refCodeInput" class="ref-enter-input"
                   placeholder="VG······" maxlength="8" autocomplete="off">
            <button type="button" class="btn btn-primary ref-enter-btn" id="btnApplyRef" aria-label="Aplicar código">
              <i data-lucide="check"></i>
            </button>
          </div>
          <p class="ref-enter-msg" id="refEnterMsg"></p>
        </div>
      </div>

      <!-- AdSense Display -->
      <div class="ads-container">
        <ins class="adsbygoogle"
             data-ad-client="ca-pub-1930529129644930"
             data-ad-slot="6388933118"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>

      <!-- Notificaciones push -->
      <div class="section">
        <h2 class="section-title"><i data-lucide="bell"></i> Notificaciones push</h2>
        <div class="action-buttons">
          <button type="button" class="btn" id="btnPush"
            onclick="togglePushNotifications(window.auth?.currentUser?.uid)">
            <i data-lucide="bell"></i> Activar notificaciones push
          </button>
        </div>
      </div>

      <!-- Soporte -->
      <div class="section">
        <h2 class="section-title"><i data-lucide="life-buoy"></i> Soporte</h2>
        <div class="action-buttons">
          <button type="button" class="btn" id="btnReport"><i data-lucide="bug"></i> Reportar un problema</button>
          <button class="btn btn-ghost-danger" id="btnDeleteAccount">Eliminar mi cuenta</button>
        </div>
      </div>

    </div><!-- /sections-wrap -->

  </div><!-- /content -->

  <div id="toast" class="toast"></div>
  <input id="avatarInput" type="file" accept="image/*" style="display:none;" />


  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js" defer></script>
  <script defer src="js/notification-badge.js"></script>
  <script defer src="js/deleteUserData.js"></script>
  <script defer src="js/push-notifications.js"></script>
  <script defer src="js/profile.js"></script>
<script>if(window.lucide)lucide.createIcons();</script>
</body>
</html>
