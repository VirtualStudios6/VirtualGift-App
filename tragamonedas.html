<!DOCTYPE html>
<html lang="es">
<head>
  <style>.adsbygoogle{display:block}.ads-container{margin:16px 0;overflow:hidden;text-align:center}</style>
  <script>if(!window.Capacitor?.isNativePlatform?.())(function(){var s=document.createElement('script');s.async=true;s.crossOrigin='anonymous';s.src='https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1930529129644930';document.head.appendChild(s)})();</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Tragamonedas — VirtualGift</title>
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/games.css">

  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/sounds.js"></script>
  <script defer src="js/tragamonedas.js"></script>
</head>
<body>

  <!-- TOP BAR -->
  <div class="game-topbar">
    <button class="game-back" onclick="window.location.href=typeof withAppFlag==='function'?withAppFlag('inicio.html'):'inicio.html'">←</button>
    <span class="game-top-title">🎰 Tragamonedas</span>
    <div class="balance-chip">
      <span class="balance-chip-icon">🪙</span>
      <span class="balance-chip-val" id="balanceVal">—</span>
    </div>
  </div>

  <div class="game-wrap">

    <!-- HERO -->
    <div class="slots-hero">
      <p class="slots-hero-title">¡Gira y gana coins!</p>
      <p class="slots-hero-sub">Consigue 3 iguales para el premio mayor</p>
    </div>

    <!-- PLAYS -->
    <div class="plays-row">
      <span class="plays-label" id="playsLabel">Cargando…</span>
      <div class="plays-pips" id="playsPips"></div>
    </div>

    <!-- MACHINE -->
    <div class="slots-machine">

      <div class="slots-jackpot">
        <div class="jackpot-label">Jackpot</div>
        <div class="jackpot-val">🎁🎁🎁 = 150 🪙</div>
      </div>

      <div class="slots-window">
        <div class="slot-reel" id="reel0">🎁</div>
        <div class="slot-reel" id="reel1">💎</div>
        <div class="slot-reel" id="reel2">⭐</div>
        <div class="slots-line"></div>
      </div>

      <!-- RESULT -->
      <div class="result-display" id="resultDisplay">
        <span class="result-miss">Pulsa GIRAR para jugar</span>
      </div>

      <button class="spin-btn" id="spinBtn" onclick="doSpin()">
        🎰 GIRAR
      </button>

    </div>

    <!-- EXTRA PLAY (ad) -->
    <div class="ad-play-row" id="adPlayRow" style="display:none">
      <button class="ad-play-btn" id="adPlayBtn" onclick="watchAd()">
        <span class="ad-play-btn-icon">▶</span>
        Ver anuncio para +1 tirada
      </button>
    </div>

    <!-- PAYTABLE -->
    <div class="paytable">
      <p class="paytable-title">Premios</p>
      <div class="paytable-row"><span class="paytable-syms">🎁🎁🎁</span><span class="paytable-prize">+150 🪙</span></div>
      <div class="paytable-row"><span class="paytable-syms">💎💎💎</span><span class="paytable-prize">+100 🪙</span></div>
      <div class="paytable-row"><span class="paytable-syms">⭐⭐⭐</span><span class="paytable-prize">+75 🪙</span></div>
      <div class="paytable-row"><span class="paytable-syms">🍀🍀🍀</span><span class="paytable-prize">+50 🪙</span></div>
      <div class="paytable-row"><span class="paytable-syms">🪙🪙🪙</span><span class="paytable-prize">+30 🪙</span></div>
      <div class="paytable-row"><span class="paytable-syms">🔥🔥🔥</span><span class="paytable-prize">+20 🪙</span></div>
      <div class="paytable-row"><span class="paytable-syms">Dos iguales</span><span class="paytable-prize">+8 🪙</span></div>
    </div>

    <!-- AdSense -->
    <div class="ads-container" style="margin-top:20px">
      <ins class="adsbygoogle"
           data-ad-client="ca-pub-1930529129644930"
           data-ad-slot="6388933118"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

  </div>

  <!-- AD OVERLAY -->
  <div class="ad-overlay" id="adOverlay" style="display:none">
    <div class="ad-overlay-box">
      <p class="ad-overlay-title">▶ Viendo anuncio…</p>
      <p class="ad-overlay-sub">Espera para recibir tu tirada extra</p>
      <div class="ad-timer" id="adTimerVal">5</div>
      <div class="ad-adsense-wrap">
        <ins class="adsbygoogle"
             data-ad-client="ca-pub-1930529129644930"
             data-ad-slot="6388933118"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <button class="ad-close-btn" id="adCloseBtn" onclick="closeAd()" disabled>
        ✓ Reclamar tirada extra
      </button>
    </div>
  </div>

  <div class="game-toast" id="gameToast"></div>

</body>
</html>
