<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Tragamonedas — VirtualGift</title>
  <link rel="icon" type="image/png" href="images/logo-virtual-login.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/games.css">

  <script defer src="js/app-mode.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/sounds.js"></script>
<script defer src="js/tragamonedas.js"></script>
</head>
<body>

  <!-- TOP BAR -->
  <div class="game-topbar">
    <button class="game-back" onclick="window.location.href=typeof withAppFlag==='function'?withAppFlag('inicio.html'):'inicio.html'">←</button>
    <span class="game-top-title">🎰 Tragamonedas</span>
    <div class="balance-chip">
      <span class="balance-chip-icon">🪙</span>
      <span class="balance-chip-val" id="balanceVal">—</span>
    </div>
  </div>

  <div class="game-wrap">

    <!-- HERO -->
    <div class="slots-hero">
      <div class="slots-hero-glow" aria-hidden="true"></div>
      <p class="slots-hero-title">¡Gira y Gana!</p>
      <p class="slots-hero-sub">3 iguales = premio mayor &nbsp;·&nbsp; 2 iguales = +8 🪙</p>
    </div>

    <!-- PLAYS -->
    <div class="plays-row">
      <span class="plays-label" id="playsLabel">Cargando…</span>
      <div class="plays-pips" id="playsPips"></div>
    </div>

    <!-- MACHINE -->
    <div class="slots-machine">

      <div class="slots-lights" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="slots-jackpot">
        <div class="jackpot-label">✦ JACKPOT ✦</div>
        <div class="jackpot-val">🍒🍒🍒 = 150 🪙</div>
      </div>

      <div class="slots-window">
        <div class="slot-reel" id="reel0">🍒</div>
        <div class="slot-reel" id="reel1">💎</div>
        <div class="slot-reel" id="reel2">🍊</div>
        <div class="slots-line"></div>
      </div>

      <!-- RESULT -->
      <div class="result-display" id="resultDisplay">
        <span class="result-miss">Pulsa GIRAR para jugar</span>
      </div>

      <button type="button" class="spin-btn" id="spinBtn" onclick="doSpin()">
        🎰 &nbsp;GIRAR
      </button>

      <div class="slots-lights slots-lights--bottom" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>

    </div>
<!-- PAYTABLE -->
    <div class="paytable">
      <p class="paytable-title">Tabla de Premios</p>
      <div class="paytable-row paytable-row--jackpot">
        <span class="paytable-syms">🍒🍒🍒</span>
        <span class="paytable-prize paytable-prize--jackpot">+150 🪙</span>
      </div>
      <div class="paytable-row">
        <span class="paytable-syms">💎💎💎</span>
        <span class="paytable-prize paytable-prize--high">+100 🪙</span>
      </div>
      <div class="paytable-row">
        <span class="paytable-syms">🍇🍇🍇</span>
        <span class="paytable-prize paytable-prize--high">+75 🪙</span>
      </div>
      <div class="paytable-row">
        <span class="paytable-syms">🔔🔔🔔</span>
        <span class="paytable-prize paytable-prize--mid">+50 🪙</span>
      </div>
      <div class="paytable-row">
        <span class="paytable-syms">🍋🍋🍋</span>
        <span class="paytable-prize paytable-prize--mid">+30 🪙</span>
      </div>
      <div class="paytable-row">
        <span class="paytable-syms">🍊🍊🍊</span>
        <span class="paytable-prize paytable-prize--low">+20 🪙</span>
      </div>
      <div class="paytable-row paytable-row--last">
        <span class="paytable-syms paytable-syms--text">Dos iguales</span>
        <span class="paytable-prize paytable-prize--low">+8 🪙</span>
      </div>
    </div>
</div>
<div class="game-toast" id="gameToast"></div>

</body>
</html>
