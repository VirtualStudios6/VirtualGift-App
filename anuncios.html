<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06011c">
  <title>Anuncios desactivados - VirtualGift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/splash.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/bottom-nav.css">
  <link rel="stylesheet" href="css/anuncios.css">
  <script defer src="js/app-mode.js"></script>
</head>
<body>
  <div id="vg-splash">
    <img id="vg-splash-logo" src="images/logo-virtual-login.png" alt="VirtualGift">
    <div id="vg-splash-name">VIRTUAL<span>GIFT</span></div>
    <div id="vg-splash-spinner"></div>
  </div>

  <header class="header">
    <div class="logo">
      <img src="images/logo-virtual-login.png" alt="VirtualGift Logo" class="logo-image">
      <span class="logo-text">VIRTUAL<span class="logo-studios">GIFT</span></span>
    </div>
    <div class="header-icons">
      <div class="icon-users" onclick="window.location.href=withAppFlag('home.html')" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="icon-coin" onclick="window.location.href=withAppFlag('puntos.html')" style="cursor:pointer;">
        <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#FDB813"/><circle cx="50" cy="50" r="42" fill="#FFD700"/><path d="M 30 30 L 42 65 L 58 65 L 70 30 L 62 30 L 54 57 L 46 57 L 38 30 Z" fill="#FFFACD"/></svg>
      </div>
    </div>
  </header>

  <main class="ad-page">
    <section class="ad-progress-card" style="text-align:center; margin-top:32px;">
      <h1 class="ad-hero-title">Anuncios desactivados</h1>
      <p class="ad-status">VirtualGift ya no usa AdMob, AdSense ni recompensas por anuncios.</p>
      <button class="ad-watch-btn" type="button" onclick="window.location.href=withAppFlag('puntos.html')">Volver a mis coins</button>
    </section>
  </main>

  <script defer src="js/bottom-nav.js"></script>
  <script src="js/splash.js"></script>
</body>
</html>
